version: '3.9'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  app:
    build: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/qr-menu
      - ADMIN_KEY=changeme-change-this
      - CLIENT_URL=http://localhost
      - ALLOWED_ORIGINS=http://localhost
    ports:
      - "5000:5000"
    depends_on:
      - mongo
volumes:
  mongo_data:
